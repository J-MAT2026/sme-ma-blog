name: Daily Update

on:
  schedule:
    - cron: '10 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: python app.py

      - name: Commit
        run: |

          mkdir -p _posts
          cp out/*.md _posts/

          git config user.name "bot"
          git config user.email "bot@example.com"

          git add _posts
          git commit -m "daily update" || echo "no change"
          git push
