<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #000;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
    }

    header img {
      height: 40px;
      margin-right: 12px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .hero {
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .hero h2 {
      margin: 0 0 10px;
    }

    .section {
      margin-bottom: 30px;
    }

    .card {
      background: #fff;
      padding: 16px;
      margin-bottom: 10px;
      border-radius: 6px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    a {
      text-decoration: none;
      color: #000;
    }

    .meta {
      font-size: 12px;
      color: #777;
    }

  </style>
</head>

<body>

<header>
  <img src="/assets/logo.png">
  <h1>J-MAT</h1>
</header>

<div class="container">
  {{ content }}
</div>

</body>
</html>
