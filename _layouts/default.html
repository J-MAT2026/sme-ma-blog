<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      margin: 0;
      background: #f7f7f7;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ヘッダー */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 16px 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
    }

    .logo {
      height: 50px;
      margin-right: 12px;
    }

    .site-title {
      font-size: 24px;
      font-weight: bold;
    }

    .site-title span {
      font-size: 12px;
      display: block;
      color: #777;
    }

    /* セクション */
    .section-title {
      font-size: 20px;
      margin: 20px 0 10px;
    }

    /* 記事カード */
    .posts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .post-card {
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #eee;
      transition: 0.2s;
    }

    .post-card:hover {
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .post-card a {
      text-decoration: none;
      color: inherit;
    }

    .post-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .post-summary {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .post-date {
      font-size: 12px;
      color: #999;
    }

    /* 記事ページ */
    .post-content {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <img src="/assets/logo.png" class="logo">
    <div class="site-title">
      J-MAT
      <span>JAPAN M&A TIMES</span>
    </div>
  </div>
</header>

<div class="container">
  {{ content }}
</div>

</body>
</html>
