<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="日本のM&A最新ニュースをいち早くお届け。買収・合併・資本提携など重要案件を毎日更新。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #c0392b;
      --primary-dark: #962d22;
      --bg: #f2f2f0;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #666;
      --border: #e0e0e0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ========== ヘッダー ========== */
    .site-header {
      background: var(--text);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      height: 40px;
      object-fit: contain;
    }
    .logo-fallback {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 14px;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .site-title {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1.1;
    }
    .site-title span {
      font-size: 10px;
      font-weight: 400;
      color: #aaa;
      display: block;
      letter-spacing: 3px;
      margin-top: 2px;
    }
    .header-badge {
      margin-left: auto;
      background: var(--primary);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* ========== ヒーロー帯 ========== */
    .hero-bar {
      background: var(--primary);
      color: #fff;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* ========== メインコンテンツ ========== */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* ========== セクションタイトル ========== */
    .section-title {
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--primary);
    }

    /* ========== カードグリッド ========== */
    .posts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (max-width: 640px) {
      .posts { grid-template-columns: 1fr; }
    }

    .post-card {
      background: var(--card-bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: transform 0.18s, box-shadow 0.18s;
      overflow: hidden;
    }
    .post-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.10);
    }
    .post-card a {
      display: block;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      height: 100%;
    }
    .post-card-tag {
      display: inline-block;
      background: #fdecea;
      color: var(--primary);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .post-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 10px;
      color: var(--text);
    }
    .post-summary {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 14px;
    }
    .post-date {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
    }

    /* ========== 記事なし ========== */
    .no-posts {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 15px;
      background: var(--card-bg);
      border-radius: 10px;
      border: 1px dashed var(--border);
    }

    /* ========== 記事ページ ========== */
    .post-content {
      background: var(--card-bg);
      padding: 32px;
      border-radius: 10px;
      border: 1px solid var(--border);
      line-height: 1.9;
      font-size: 15px;
    }
    .post-content h2 {
      font-size: 20px;
      font-weight: 900;
      margin: 28px 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .post-content h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 20px 0 8px;
      color: var(--primary);
    }
    .post-content a {
      color: var(--primary);
      font-weight: 700;
    }
    .post-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ========== フッター ========== */
    .site-footer {
      background: var(--text);
      color: #888;
      text-align: center;
      padding: 24px;
      font-size: 12px;
      margin-top: 40px;
    }
    .site-footer strong {
      color: #fff;
    }
  </style>
</head>
<body>

<div class="hero-bar">📰 毎朝9時更新 ｜ 日本のM&A最新情報をお届け</div>

<header class="site-header">
  <div class="header-inner">
    <a href="{{ site.baseurl }}/" style="display:flex;align-items:center;gap:14px;text-decoration:none;">
      <img src="{{ site.baseurl }}/assets/logo.png" class="logo" onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex'">
      <div class="logo-fallback" id="logo-fb" style="display:none">M</div>
      <div class="site-title">
        J-MAT
        <span>JAPAN M&amp;A TIMES</span>
      </div>
    </a>
    <div class="header-badge">DAILY</div>
  </div>
</header>

<div class="container">
  {{ content }}
</div>

<footer class="site-footer">
  <strong>J-MAT – JAPAN M&A TIMES</strong><br>
  本サイトの情報は各種RSSフィードより自動収集しています。投資判断は自己責任でお願いします。
</footer>

</body>
</html>
