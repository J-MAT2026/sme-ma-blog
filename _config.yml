baseurl: "/sme-ma-blog"
url: "https://j-mat2026.github.io"

timezone: Asia/Tokyo
future: true
markdown: kramdown

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
